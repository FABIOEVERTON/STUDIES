<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #b30000;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    #countdown {
        font-size: 80px;
        font-weight: bold;
    }

    button {
        margin-top: 20px;
        padding: 14px 22px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: white;
        color: #b30000;
        font-weight: bold;
    }

    #final {
        display: none;
        font-size: 28px;
    }
</style>
</head>

<body>

<div>
    <h1>Verificação em andamento</h1>

    <div id="countdown">10</div>

    <button onclick="exit()">Sair</button>

    <div id="final">🎉 BRINCADEIRA DO PAPAI 😄</div>
</div>

<script>
let time = 10;
let interval;
let audioCtx;

function beep() {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 750;
    gain.gain.value = 0.05;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function start() {
    if (interval) return; // evita duplicar

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    interval = setInterval(() => {
        time--;

        const el = document.getElementById("countdown");
        el.textContent = time;

        beep();

        if (time <= 0) {
            clearInterval(interval);
            document.getElementById("countdown").style.display = "none";
            document.querySelector("button").style.display = "none";
            document.getElementById("final").style.display = "block";
        }
    }, 1000);
}

// GARANTIA REAL: roda assim que DOM estiver pronto
document.addEventListener("DOMContentLoaded", () => {
    start();
});

function exit() {
    document.body.innerHTML = "<h1 style='color:black; text-align:center; margin-top:20%;'>Você saiu 😄</h1>";
}
</script>

</body>
</html>
